<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tento Mineiro</title>

    <style>
        * {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: Arial, Helvetica, sans-serif;
            margin-top: 20px;
        }

        main {
            width: 300px;
            height: 200px;
            background-image: url(imagens/dado-editado1.0.png);
            background-size: cover;
            background-position: center;
            position: relative; /* necessário para centralizar o marcador */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #marcador {
            width: 70px;
            height: 45px;
            background-color: rgba(255, 255, 255, 0.8);
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 22px;
            font-weight: bold;
        }

        #funcoes {
            margin-top: 20px;
        }

        #funcoes button {
            padding: 8px 12px;
            margin: 5px;
            font-size: 16px;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <header id="titulo">
        <h1>Tento Mineiro</h1>
    </header>

    <main>
        <div id="marcador">
            <p id="valor">0</p>
        </div>
    </main>

    <section id="funcoes">
        <button onclick="somar(2)">+2</button>
        <button onclick="somar(4)">+4</button>
        <button onclick="somar(6)">+6</button>
        <button onclick="somar(8)">+8</button>
        <button onclick="limpar()">Limpar</button>
    </section>

    <script>
        let total = 0;

        function somar(valor) {
            total += valor;
            document.getElementById("valor").innerText = total;
        }

        function limpar() {
            total = 0;
            document.getElementById("valor").innerText = total;
        }
    </script>

</body>
</html>
